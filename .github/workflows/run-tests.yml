name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 9 — PHP 8.1 / 8.2
          - php: "8.1"
            laravel: "^9.0"
            testbench: "^7.0"
          - php: "8.2"
            laravel: "^9.0"
            testbench: "^7.0"
          # Laravel 10 — PHP 8.1 / 8.2 / 8.3
          - php: "8.1"
            laravel: "^10.0"
            testbench: "^8.0"
          - php: "8.2"
            laravel: "^10.0"
            testbench: "^8.0"
          - php: "8.3"
            laravel: "^10.0"
            testbench: "^8.0"
          # Laravel 11 — PHP 8.2 / 8.3
          - php: "8.2"
            laravel: "^11.0"
            testbench: "^9.0"
          - php: "8.3"
            laravel: "^11.0"
            testbench: "^9.0"

    name: "PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run test suite
        run: composer test

  lint:
    runs-on: ubuntu-latest
    name: "Code Style (Pint)"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Check code style
        run: composer pint -- --test

  analyse:
    runs-on: ubuntu-latest
    name: "Static Analysis (PHPStan)"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: composer stan
